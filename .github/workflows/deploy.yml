name: Deploy GitBook to Private Server

on:
  push:
    branches:
      - main  # 请根据你的实际默认分支（main或master）进行修改

jobs:
  trigger-server-crawl:
    name: Trigger Remote Server Crawl
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Bash Script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          # 核心技巧：使用 nohup 与重定向使得 ssh 命令秒级退出，避免阻塞 Github Action 计费时长
          script: |
            nohup /opt/scripts/sync_gitbook.sh > /dev/null 2>&1 </dev/null &
