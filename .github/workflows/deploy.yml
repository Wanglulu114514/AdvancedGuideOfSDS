name: Build and Deploy GitBook

# 触发条件：当主分支有代码推送时执行
on:
  push:
    branches:
      - main     # 如果你的主分支叫 master，请改成 master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # 使用 GitHub 提供的免费 Ubuntu 运行环境

    steps:
      # 1. 拉取仓库的 Markdown 代码
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. 配置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. 核心修复：清洗新版 GitBook 的专有语法，优雅降级为标准 Markdown
      - name: Sanitize GitBook proprietary tags
        run: |
          # 3.1 处理 embed (网页/视频嵌入)：降级为普通的可点击链接
          find . -name "*.md" -type f -exec sed -i -E 's/\{% embed url="([^"]+)" %\}/[🔗 外部链接: \1](\1)/g' {} +
          find . -name "*.md" -type f -exec sed -i 's/{% endembed %}//g' {} +
          find . -name "*.md" -type f -exec sed -i -E 's/\{% embed.*%\}//g' {} +
          
          # 3.2 处理 hint (提示框)：降级为 Markdown 的标准引用 (Blockquote)
          find . -name "*.md" -type f -exec sed -i -E 's/\{% hint style="([^"]+)" %\}/> **提示 (\1):**<br>/g' {} +
          find . -name "*.md" -type f -exec sed -i 's/{% endhint %}//g' {} +
          
          # 3.3 处理 tabs (标签页)：降级为普通的三级标题
          find . -name "*.md" -type f -exec sed -i 's/{% tabs %}//g' {} +
          find . -name "*.md" -type f -exec sed -i 's/{% endtabs %}//g' {} +
          find . -name "*.md" -type f -exec sed -i -E 's/\{% tab title="([^"]+)" %\}/### \1/g' {} +
          find . -name "*.md" -type f -exec sed -i 's/{% endtab %}//g' {} +

          # 3.4 处理 file 和 content-ref (附件和内部引用)：降级为标准链接
          find . -name "*.md" -type f -exec sed -i -E 's/\{% file src="([^"]+)" %\}/[📄 附件](\1)/g' {} +
          find . -name "*.md" -type f -exec sed -i 's/{% endfile %}//g' {} +
          find . -name "*.md" -type f -exec sed -i -E 's/\{% content-ref url="([^"]+)" %\}/[🔗 参考链接](\1)/g' {} +
          find . -name "*.md" -type f -exec sed -i 's/{% endcontent-ref %}//g' {} +

      # 4. 安装 HonKit 并编译静态文件
      - name: Build with HonKit
        run: |
          npm install -g honkit
          honkit build

      # 5. 通过 Rsync 部署到你的 Linux 服务器
      - name: Deploy to Server via Rsync
        env:
          PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          HOST: ${{ secrets.SERVER_IP }}
          USER: ${{ secrets.SERVER_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts
          # 增量同步到服务器
          rsync -avz --delete _book/ $USER@$HOST:/var/www/mygitbook/
